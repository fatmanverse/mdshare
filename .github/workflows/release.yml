name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1 || \
          gh release create "$TAG_NAME" --repo "$GH_REPO" --title "$TAG_NAME" --generate-notes

  build-and-upload:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: win
          - os: macos-latest
            target: mac
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Build distributables
        run: npm run dist:${{ matrix.target }}

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          shopt -s nullglob
          assets=(release/*)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No release artifacts found in release/"
            exit 1
          fi
          gh release upload "$TAG_NAME" "${assets[@]}" --repo "$GH_REPO" --clobber
